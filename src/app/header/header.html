<header>
  <div class="header">
    <img class="header__image" src="favicon.ico">
    <span class="header__title">{{ siteTitle() }}</span>

    <div class="right">
      <span>Mentorship</span>
      <p-button 
        [icon]="isDark() ? 'pi pi-sun' : 'pi pi-moon'"
        ariaLabel="Toggle dark mode"
        [rounded]="true" 
        [text]="true" 
        (onClick)="toggleDarkMode()"/>
      <p-button label="Socials" [rounded]="true" severity="secondary" variant="outlined" (onClick)="scrollToContact()"/>
    </div>
  </div>
</header>
