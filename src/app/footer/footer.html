<footer class="footer" id="contact">
  <div class="footer__footerbox">
    <img src="favicon.ico">

    <p class="footer__text">{{ 'FOOTER.TAGLINE' | translate }}</p>

    <div class="footer__socials">
      @for (social of socials(); track social.url) {
        <a [href]="social.url" target="_blank" rel="noopener noreferrer">
          <p-button [rounded]="true" [text]="true" [icon]="social.icon" [pt]="{ icon: { style: { color: '#ffffff' } } }"/>
        </a>
      }
    </div>

    <p>{{ 'FOOTER.HANDCRAFTED' | translate }}</p>
  </div>
</footer>
