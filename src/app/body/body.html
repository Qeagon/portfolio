<section>
  <div class="body">
    <h1 class="body__title">{{ 'ABOUT.TITLE' | translate }}</h1>
    <p class="body__subtitle">{{ 'ABOUT.SUBTITLE' | translate }}</p>
    <p-avatar [image]="avatar()" class="body__image" shape="circle" size="xlarge"/>
  </div>

  <div class="bodyfoot">
    <img class="body__image2" src="hero-devices.svg">
  </div>
</section>

<section class="text-box">
  <p-card [pt]="{
    root: { style: { background: 'var(--p-primary-color)', boxShadow: '0 4px 15px rgba(0,0,0,0.3)', color: '#ffffff' } },
    body: { style: { display: 'flex', flexDirection: 'column', justifyContent: 'center', height: '100%' } }
  }">
    <ng-template #title>{{ 'ABOUT.CARD_TITLE' | translate }}</ng-template>
    <ng-template #content>
      <p class="text-box__text">{{ 'ABOUT.CARD_TEXT' | translate }}</p>
    </ng-template>
  </p-card>
</section>
